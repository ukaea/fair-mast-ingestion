facility: "MASTU"
default_loader: "uda"
plasma_current: "summary/ip"
default_start: -0.1

license:
  name: "Creative Commons 4.0 BY-SA"
  url: "https://creativecommons.org/licenses/by-sa/4.0/"

datasets:
  equilibrium:
    imas: "equilibrium"
    description: "Description of a 2D, axi-symmetric, tokamak equilibrium; result of an equilibrium code."
    interpolate:
      time:
        start: -0.1
        step: 5e-3
        method: 'zero'
        dropna: true
      z:
        method: "none"
      major_radius:
        start: 0.06
        step: 0.03
        end: 2.0
        method: "linear"
      n_boundary_coords:
        method: "none"
        dropna: true
      n_x_points_r:
        method: "none"
        dropna: true
      n_x_points_z:
        method: "none"
        dropna: true
      profile_r:
        method: "none"
      psi_norm:
        method: "none"
      n_pf_current:
        method: "none"
      n_b_field_pol_probe:
        method: "none"
      n_flux_loop:
        method: "none"

    profiles:
      q:
        source: "epm/output/radialProfiles/q"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].profiles_1d.q"
        description: "Safety factor (only positive when toroidal current and magnetic field are in same direction)"
        dimension_order: ['profile_r', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          profile_r:
            units: 'dimensionless'

      j_phi:
        source: "epm/output/profiles2D/jphi"
        units: 'A/m^2'
        imas: "equilibrium.time_slice[:].profiles_2d[:].j_phi"
        description: "Toroidal plasma current density"
        dimension_order: ['z', 'major_radius', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          major_radius:
            source: "epm/output/profiles2D/r"
            units: 'm'
            imas: "equilibrium.time_slice[:].coordinate_system.r"
          z:
            source: "epm/output/profiles2D/z"
            units: 'm'
            imas: "equilibrium.time_slice[:].coordinate_system.z"

      psi:
        source: "epm/output/profiles2D/poloidalFlux"
        units: 'Wb/rad'
        imas: "equilibrium.time_slice[:].profiles_2d[:].psi"
        description: "Values of the poloidal flux at the grid in the
          poloidal plane. The poloidal flux is integral of magnetic field
          passing through a contour defined by the intersection of a flux
          surface passing through the point of interest and a Z=constant plane.
          If the integration surface is flat, the surface normal vector is in
          the increasing vertical coordinate direction, Z, namely upwards."
        dimension_order: ['z', 'major_radius', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          major_radius:
            source: "epm/output/profiles2D/r"
            units: 'm'
            imas: "equilibrium.time_slice[:].coordinate_system.r"
          z:
            source: "epm/output/profiles2D/z"
            units: 'm'
            imas: "equilibrium.time_slice[:].coordinate_system.z"

      f_df_dpsi:
        source: "epm/output/fluxFunctionProfiles/ffPrime"
        units: 'T*rad'
        imas: "equilibrium.time_slice[:].profiles_1d.f_df_dpsi"
        dimension_order: ['psi_norm', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          psi_norm:
            source: "epm/output/fluxFunctionProfiles/normalizedPoloidalFlux"
            units: 'dimensionless'

      dpressure_dpsi:
        source: "epm/output/fluxFunctionProfiles/staticPPrime"
        units: 'Pa*rad/Wb'
        imas: "equilibrium.time_slice[:].profiles_1d.dpressure_dpsi"
        dimension_order: ['psi_norm', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          psi_norm:
            source: "epm/output/fluxFunctionProfiles/normalizedPoloidalFlux"
            units: 'dimensionless'

      f:
        source: "epm/output/fluxFunctionProfiles/rBphi"
        units: 'T*m'
        imas: "equilibrium.time_slice[:].profiles_1d.f"
        description: "Diamagnetic function (F=R B_Phi)"
        dimension_order: ['psi_norm', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          psi_norm:
            source: "epm/output/fluxFunctionProfiles/normalizedPoloidalFlux"
            units: 'dimensionless'

      pressure:
        source: "epm/output/fluxFunctionProfiles/staticPressure"
        units: 'Pa'
        imas: "equilibrium.time_slice[:].profiles_1d.pressure"
        description: "Pressure"
        dimension_order: ['psi_norm', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          psi_norm:
            source: "epm/output/fluxFunctionProfiles/normalizedPoloidalFlux"
            units: 'dimensionless'

      total_pressure:
        source: "epm/output/radialProfiles/totalPressure"
        units: 'Pa'
        description: "Total (static plus rotational) pressure on the radial grid" # MAST-U only; EFIT on MAST does not separate the rotational term
        dimension_order: ['profile_r', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          profile_r:
            units: 'dimensionless'

      area_psi:
        source: "epm/output/fluxFunctionProfiles/poloidalFluxArea"
        units: 'm^2'
        imas: "equilibrium.time_slice[:].profiles_1d.area"
        description: "Cross-sectional area of the flux surface"
        dimension_order: ['psi_norm', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          psi_norm:
            source: "epm/output/fluxFunctionProfiles/normalizedPoloidalFlux"
            units: 'dimensionless'

      volume_psi:
        source: "epm/output/fluxFunctionProfiles/plasmaFluxVolume"
        units: 'm^3'
        imas: "equilibrium.time_slice[:].profiles_1d.volume"
        description: "Volume enclosed inside the magnetic surface"
        dimension_order: ['psi_norm', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          psi_norm:
            source: "epm/output/fluxFunctionProfiles/normalizedPoloidalFlux"
            units: 'dimensionless'

      elongation_psi:
        source: "epm/output/fluxFunctionProfiles/elongation"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].profiles_1d.elongation"
        description: "Elongation of the flux surfaces"
        dimension_order: ['psi_norm', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          psi_norm:
            source: "epm/output/fluxFunctionProfiles/normalizedPoloidalFlux"
            units: 'dimensionless'

      triangularity_lower_psi:
        source: "epm/output/fluxFunctionProfiles/lowerTriangularity"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].profiles_1d.triangularity_lower"
        description: "Lower triangularity of the flux surfaces"
        dimension_order: ['psi_norm', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          psi_norm:
            source: "epm/output/fluxFunctionProfiles/normalizedPoloidalFlux"
            units: 'dimensionless'

      triangularity_upper_psi:
        source: "epm/output/fluxFunctionProfiles/upperTriangularity"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].profiles_1d.triangularity_upper"
        description: "Upper triangularity of the flux surfaces"
        dimension_order: ['psi_norm', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          psi_norm:
            source: "epm/output/fluxFunctionProfiles/normalizedPoloidalFlux"
            units: 'dimensionless'

      elongation:
        source: "epm/output/separatrixGeometry/elongation"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].boundary.elongation"
        description: "Elongation of the plasma boundary"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      x_point_r:
        source:
          - name: "EPM_XPOINT_R"
            channels:
              - "epm/output/separatrixGeometry/dndXpoint1R"
              - "epm/output/separatrixGeometry/dndXpoint2R"
        imas: "equilibrium.time_slice[:].boundary.x_point[:].r"
        units: "m"
        description: "Major radius of the plasma boundary X-points"
        dimensions:
          n_x_points_r:
          time:
            imas: "equilibrium.time_slice[:].time"

      x_point_z:
        source:
          - name: "EPM_XPOINT_Z"
            channels:
              - "epm/output/separatrixGeometry/dndXpoint1Z"
              - "epm/output/separatrixGeometry/dndXpoint2Z"
        imas: "equilibrium.time_slice[:].boundary.x_point[:].z"
        units: "m"
        description: "Height of the plasma boundary X-points"
        dimensions:
          n_x_points_z:
          time:
            imas: "equilibrium.time_slice[:].time"

      minor_radius:
        source: "epm/output/separatrixGeometry/minorRadius"
        units: "m"
        imas: "equilibrium.time_slice[:].boundary.minor_radius"
        description: "Minor radius of the plasma boundary (defined as (Rmax-Rmin) / 2 of the boundary)"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      triangularity_lower:
        source: "epm/output/separatrixGeometry/lowerTriangularity"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].boundary.triangularity_lower"
        description: "Lower triangularity w.r.t. magnetic axis"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      triangularity_upper:
        source: "epm/output/separatrixGeometry/upperTriangularity"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].boundary.triangularity_upper"
        description: "Upper triangularity w.r.t. magnetic axis"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      magnetic_axis_r:
        source: "epm/output/globalParameters/magneticAxis/R"
        units: 'm'
        imas: "equilibrium.time_slice[:].global_quantities.magnetic_axis.r"
        description: "Major radius of the magnetic axis"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      magnetic_axis_z:
        source: "epm/output/globalParameters/magneticAxis/Z"
        units: 'm'
        imas: "equilibrium.time_slice[:].global_quantities.magnetic_axis.z"
        description: "Height of the magnetic axis"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      geometric_axis_z:
        source: "epm/output/separatrixGeometry/zGeom"
        units: 'm'
        imas: "equilibrium.time_slice[:].boundary.geometric_axis.z"
        description: "Height of the geometric axis of the plasma boundary" # EPM publishes no matching rGeom, so there is no geometric_axis_r on MAST-U
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      beta_tor_normal:
        source: "epm/output/globalParameters/betan"
        units: "dimensionless"
        imas: "equilibrium.time_slice[:].global_quantities.beta_tor_normal"
        description: "Normalized toroidal beta, defined as 100 * beta_tor * a[m] * B0 [T] / ip [MA]"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      beta_pol:
        source: "epm/output/globalParameters/betap"
        units: "dimensionless"
        imas: "equilibrium.time_slice[:].global_quantities.beta_pol"
        description: "Poloidal beta. Defined as betap = 4 int(p dV) / [R_0 * mu_0 * Ip^2]"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      beta_tor:
        source: "epm/output/globalParameters/betat"
        units: "dimensionless"
        imas: "equilibrium.time_slice[:].global_quantities.beta_tor"
        description: "Toroidal beta, defined as the volume-averaged total perpendicular pressure divided by (B0^2/(2*mu0)), i.e. beta_toroidal = 2 mu0 int(p dV) / V / B0^2"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      bphi_rmag:
        source: "epm/output/globalParameters/bphiRmag"
        units: 'T'
        imas: "equilibrium.time_slice[:].global_quantities.magnetic_axis.b_field_tor"
        description: "Total toroidal magnetic field at the magnetic axis"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      bvac_rmag:
        source: "epm/output/globalParameters/bvacRmag"
        units: 'T'
        description: "Vacuum toroidal magnetic field at the magnetic axis"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      bvac_val:
        source: "epm/output/globalParameters/bvacRgeom"
        units: 'T'
        imas: "equilibrium.vacuum_toroidal_field.b0"
        description: "Vacuum toroidal magnetic field at the geometric axis" # MAST reports this at a separately-stored reference radius (bvac_r); EPM has no equivalent radius signal
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      li:
        source: "epm/output/globalParameters/li3"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].global_quantities.li_3"
        description: "Internal inductance"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      area:
        source: "epm/output/globalParameters/poloidalArea"
        units: 'm^2'
        imas: "equilibrium.time_slice[:].global_quantities.area"
        description: "Area of the poloidal cross section"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      ip:
        source: "epm/output/globalParameters/plasmaCurrent"
        units: 'A'
        imas: "equilibrium.time_slice[:].global_quantities.ip"
        description: "Plasma current (toroidal component). Positive sign means anti-clockwise when viewed from above."
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      psi_axis:
        source: "epm/output/globalParameters/psiAxis"
        units: 'Wb/rad'
        imas: "equilibrium.time_slice[:].global_quantities.psi_axis"
        description: "Poloidal flux at the magnetic axis"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      psi_boundary:
        source: "epm/output/globalParameters/psiBoundary"
        units: 'Wb/rad'
        imas: "equilibrium.time_slice[:].global_quantities.psi_boundary"
        description: "Poloidal flux at the selected plasma boundary"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      q_axis:
        source: "epm/output/globalParameters/q0"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].global_quantities.q_axis"
        description: "q at the magnetic axis"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      q95:
        source: "epm/output/globalParameters/q95"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].global_quantities.q_95"
        description: "q at the 95% poloidal flux surface (only positive when toroidal current and magnetic field are in same direction)"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      lcfs_r:
        source: "epm/output/separatrixGeometry/rBoundary"
        units: 'm'
        imas: "equilibrium.time_slice[:].boundary.lcfs.r"
        dimension_order: ['n_boundary_coords', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          n_boundary_coords:
            units: 'dimensionless'

      lcfs_z:
        source: "epm/output/separatrixGeometry/zBoundary"
        units: 'm'
        imas: "equilibrium.time_slice[:].boundary.lcfs.z"
        dimension_order: ['n_boundary_coords', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          n_boundary_coords:
            units: 'dimensionless'

      rpsi100_in:
        source: "epm/output/separatrixGeometry/rmidplaneIn"
        units: 'm'
        imas: "equilibrium.time_slice[:].profiles_1d.r_inboard"
        description: "Radial coordinate on the inboard side, at 100% normalised poloidal flux"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      rpsi100_out:
        source: "epm/output/separatrixGeometry/rmidplaneOut"
        units: 'm'
        imas: "equilibrium.time_slice[:].profiles_1d.r_outboard"
        description: "Radial coordinate on the outboard side, at 100% normalised poloidal flux"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      vloop_static:
        source: "esm/vloop/static"
        units: 'V'
        description: "Static LCFS loop voltage"
        dimensions:
          time:
            imas: "equilibrium.time_slice[:].time"

      vloop_dynamic:
        source: "esm/vloop/dynamic"
        units: 'V'
        description: "Dynamic LCFS loop voltage"
        dimensions:
          time:
            imas: "equilibrium.time_slice[:].time"

      pf_current:
        source: "epm/input/constraints/pfCircuits/target"
        imas: "equilibrium.time_slice[:].constraints.pf_current[:].measured"
        units: "A"
        description: "Measured PF coil current used as a constraint in the reconstruction"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          n_pf_current:

      pf_current_reconstructed:
        source: "epm/input/constraints/pfCircuits/computed"
        imas: "equilibrium.time_slice[:].constraints.pf_current[:].reconstructed"
        units: "A"
        description: "PF coil current reconstructed from the equilibrium fit"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          n_pf_current:

      pf_current_sigma:
        source: "epm/input/constraints/pfCircuits/sigmas"
        units: "A"
        description: "Standard deviation assigned to the PF coil current constraint" # EPM stores sigma directly; MAST instead publishes pf_current_chi_squared
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          n_pf_current:

      pf_current_weight:
        source: "epm/input/constraints/pfCircuits/weights"
        imas: "equilibrium.time_slice[:].constraints.pf_current[:].weight"
        units: "dimensionless"
        description: "Weight given to the PF coil current constraint in the reconstruction"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          n_pf_current:

      b_field_pol_probe_measured:
        source: "epm/input/constraints/magneticProbes/target"
        imas: "equilibrium.time_slice[:].constraints.b_field_pol_probe[:].measured"
        units: "T"
        description: "Measured poloidal magnetic field probe value used as a constraint in the reconstruction"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          n_b_field_pol_probe:

      b_field_pol_probe_reconstructed:
        source: "epm/input/constraints/magneticProbes/computed"
        imas: "equilibrium.time_slice[:].constraints.b_field_pol_probe[:].reconstructed"
        units: "T"
        description: "Poloidal magnetic field probe value reconstructed from the equilibrium fit"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          n_b_field_pol_probe:

      b_field_pol_probe_sigma:
        source: "epm/input/constraints/magneticProbes/sigmas"
        units: "T"
        description: "Standard deviation assigned to the poloidal magnetic field probe constraint" # EPM stores sigma directly; MAST instead publishes b_field_pol_probe_chi_squared
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          n_b_field_pol_probe:

      b_field_pol_probe_weight:
        source: "epm/input/constraints/magneticProbes/weights"
        imas: "equilibrium.time_slice[:].constraints.b_field_pol_probe[:].weight"
        units: "dimensionless"
        description: "Weight given to the poloidal magnetic field probe constraint in the reconstruction"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          n_b_field_pol_probe:

      flux_loop_measured:
        source: "epm/input/constraints/fluxLoops/target"
        imas: "equilibrium.time_slice[:].constraints.flux_loop[:].measured"
        units: "Wb"
        description: "Measured flux loop value used as a constraint in the reconstruction"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          n_flux_loop:

      flux_loop_reconstructed:
        source: "epm/input/constraints/fluxLoops/computed"
        imas: "equilibrium.time_slice[:].constraints.flux_loop[:].reconstructed"
        units: "Wb"
        description: "Flux loop value reconstructed from the equilibrium fit"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          n_flux_loop:

      flux_loop_sigma:
        source: "epm/input/constraints/fluxLoops/sigmas"
        units: "Wb"
        description: "Standard deviation assigned to the flux loop constraint" # EPM stores sigma directly; MAST instead publishes flux_loop_chi_squared
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          n_flux_loop:

      flux_loop_weight:
        source: "epm/input/constraints/fluxLoops/weights"
        imas: "equilibrium.time_slice[:].constraints.flux_loop[:].weight"
        units: "dimensionless"
        description: "Weight given to the flux loop constraint in the reconstruction"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          n_flux_loop:

      ip_measured:
        source: "epm/input/constraints/plasmaCurrent/target"
        imas: "equilibrium.time_slice[:].constraints.ip.measured"
        units: "A"
        description: "Measured plasma current used as a constraint in the reconstruction"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      diamagnetic_flux_measured:
        source: "epm/input/constraints/diamagneticFlux/target"
        imas: "equilibrium.time_slice[:].constraints.diamagnetic_flux.measured"
        units: "Wb"
        description: "Measured diamagnetic flux used as a constraint in the reconstruction"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      diamagnetic_flux_reconstructed:
        source: "epm/input/constraints/diamagneticFlux/computed"
        imas: "equilibrium.time_slice[:].constraints.diamagnetic_flux.reconstructed"
        units: "Wb"
        description: "Diamagnetic flux reconstructed from the equilibrium fit"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

  pulse_schedule:
    imas: pulse_schedule
    description: "Description of Pulse Schedule, described by subsystems waveform references and an envelope around them. The controllers, pulse schedule and SDN are defined in separate IDSs."
    interpolate:
      time:
        start: -0.1
        step: 5e-5
        method: 'zero'
        dropna: true
    profiles:
      i_plasma:
        source: "XDC/PLASMA/T/IP_REF"
        target_units: "A"
        imas: "pulse_schedule.flux_control.ip"
        description: "Plasma current"
        dimensions:
          time:

      n_e_line:
        source: "xdc/fuelling/t/density_ref_target" # not recorded for every shot; the reader skips the profile when absent
        imas: "pulse_schedule.density_control.n_e_line"
        description: "Line integrated electron density over a line of sight in the whole vacuum chamber"
        units: "m^-2"
        scale: 1e21
        dimensions:
          time:

      z_ref:
        source: "xdc/zmanage/t/zref"
        target_units: "m"
        imas: "pulse_schedule.position_control.magnetic_axis.z.reference.data"
        description: "Z position reference waveform" # on MAST-U this waveform is uploaded to the Z-controller FPGA at shot start
        dimensions:
          time:

  summary:
    imas: "summary"
    description: "Summary of physics quantities from a simulation or an experiment.
      Dynamic quantities are either taken at given time slices (indicated in the “time” vector) or
      time-averaged over an interval (in such case the “time_width” of the interval is indicated
      and the “time” vector represents the end of each time interval)."
    interpolate:
      time:
        start: -0.1
        step: 1e-3
        method: 'zero'
        dropna: true
    profiles:
      ip:
        source: "AMC/PLASMA_CURRENT"
        imas: "summary.global_quantities.ip"
        description: "Total plasma current (toroidal component). Positive sign means anti-clockwise when viewed from above."
        target_units: "A"
        dimensions:
          time:
            imas: "summary.time"

      line_average_n_e:
        source: "esm/density/nebar"
        imas: "summary.line_average.n_e.value"
        description: "Line averaged electron density"
        dimensions:
          time:
            imas: "summary.time"

      power_nbi:
        source: "anb/sum/power"
        target_units: "W"
        imas: "summary.heating_current_drive.power_nbi"
        description: "Total NBI power coupled to the plasma"
        dimensions:
          time:
            imas: "summary.time"

      power_ohm:
        source: "esm/power/pohm"
        target_units: "W"
        imas: "summary.global_quantities.power_ohm.value"
        description: "Ohmic heating power"
        dimensions:
          time:
            imas: "summary.time"

      neutron_rates_total:
        source: "anu/fc/detector1/neutrons_var"
        imas: "summary.fusion.neutron_rates.total"
        description: "Total neutron rate from all reactions"
        units: "cps"
        target_units: "Hz"
        dimensions:
          time:
            imas: "summary.time"

      power_radiated:
        source: "abm/prad"
        imas: "summary.global_quantities.power_radiated.value"
        target_units: "W"
        description: "Total radiated power"
        dimensions:
          time:
            imas: "summary.time"

      greenwald_density:
        source: "esm/density/ng"
        units: "m^-3"
        description: "Greenwald density limit"
        dimensions:
          time:
            imas: "summary.time"

      greenwald_fraction:
        source: "esm/density/fg"
        units: "dimensionless"
        imas: "summary.global_quantities.greenwald_fraction.value"
        description: "Line averaged density as a fraction of the Greenwald density limit" # MAST-U only; MAST publishes no equivalent ESM signal
        dimensions:
          time:
            imas: "summary.time"

  bolometer:
    imas: "bolometer"
    description: "Bolometer diagnostic: per-chord radiated signal from the MAST-U ABM core array."
    interpolate:
      time:
        start: -0.1
        step: 5e-4
        method: 'zero'
        dropna: true
    profiles:
      power:
        source: "abm/core/brightness"
        imas: "bolometer.channel[:].power.data"
        units: "W/m^2"
        description: "Incident irradiance at each bolometer detector" # IMAS slot is typed W; MAST-U calibration produces W/m^2
        dimension_order: ['bolometer_channel', 'time']
        dimensions:
          time:
            imas: "bolometer.channel[:].power.time"
          bolometer_channel:

      power_radiated_total:
        source: "abm/prad"
        imas: "bolometer.power_radiated_total"
        target_units: "W"
        description: "Total radiated power integrated across the array"
        dimensions:
          time:
            imas: "bolometer.time"

      validity:
        source: "abm/core/good"
        imas: "bolometer.channel[:].validity"
        description: "Per-channel status flag (0 = failed, 1 = OK in ABM convention)"
        dimensions:
          bolometer_channel:

  interferometer:
    imas: "interferometer"
    description: "Interferometer diagnostic"
    interpolate:
      time:
        start: -0.1
        step: 2e-5
        method: 'zero'
        dropna: true
    profiles:
      n_e_line:
        source: "ane/density"
        imas: "interferometer.channel[:].n_e_line.data"
        units: "m^-2"
        description: "Line integrated electron density"
        dimensions:
          time:
            imas: "interferometer.channel[:].n_e_line.time"

  controllers:
    imas: "controllers"
    description: "Plasma control system states, proxies, and feedback signals."
    interpolate:
      time:
        start: -0.1
        step: 5e-5
        method: 'zero'
        dropna: true
    profiles:
      zip_proxy:
        source: "xdc/zmanage/f/zip"
        imas: "controllers.linear_controller[:].inputs.data"
        units: "m*A"
        description: "Z-position × Ip proxy" # used as input to the vertical stability controller. The linear_controller[:] index into which this lands refers to the Z stability controller.
        dimensions:
          time:
            imas: "controllers.time"

