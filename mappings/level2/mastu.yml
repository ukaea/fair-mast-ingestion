  spectrometer_visible:
    imas: "spectrometer_visible"
    description: "Spectrometer in visible light range diagnostic"
    interpolate:
      time:
        start: -0.01
        step: 2e-5
        method: 'zero'
        dropna: true

    profiles:
      filter_spectrometer_dalpha_voltage:
        imas: "spectrometer_visible.channel[:].filter_spectrometer.photoelectric_voltage.data"
        units: "V"
        description: "D-alpha filtered photomultiplier voltage"
        source:
          - name: "XIM_DA"
            channels:
              - "XIM/Da/HM10/R"
              - "XIM/Da/HM10/T"
              - "XIM/Da/HU10/OSP"
        dimensions:
          dalpha_channel:
          time:
            imas: "spectrometer_visible.channel[:].filter_spectrometer.photoelectric_voltage.time"

  thomson_scattering:
    imas: thomson_scattering
    description: "Thomson scattering diagnostic"
    interpolate:
      time:
        start: 0 # diagnostic doesn't pre-trigger
        step: 5e-3
        fill: 'none'
        dropna: false
      major_radius:
        start: 0.3
        end: 1.5
        step: 0.01
        fill: 'none'
        method: 'linear'

    profiles:
      t_e_core:
        source: "ayc/t_e_core"
        units: "eV"
        description: "Core electron temperature"
        dimensions:
          time:
            source: "ayc/time"
            imas: "thomson_scattering.channel[:].t_e.time"

      n_e_core:
        source: "ayc/n_e_core"
        units: "1/m ** 3"
        description: "Core electron density"
        dimensions:
          time:
            source: "ayc/time"
            imas: "thomson_scattering.channel[:].n_e.time"

      t_e:
        source: "ayc/t_e"
        imas: "thomson_scattering.channel[:].t_e"
        units: "eV"
        description: "Electron temperature"
        dimension_order: ['major_radius', 'time']
        dimensions:
          time:
            source: "ayc/time"
            imas: "thomson_scattering.channel[:].t_e.time"
          major_radius:
            imas: "thomson_scattering.channel[:].position.r"

      n_e:
        source: "ayc/n_e"
        imas: "thomson_scattering.channel[:].n_e"
        units: "1/m ** 3"
        description: "Electron density"
        dimension_order: ['major_radius', 'time']
        dimensions:
          time:
            source: "ayc/time"
            imas: "thomson_scattering.channel[:].n_e.time"
          major_radius:
            imas: "thomson_scattering.channel[:].position.r"

      p_e:
        source: "ayc/p_e"
        units: "Pa"
        description: "Electron pressure"
        dimension_order: ['major_radius', 'time']
        dimensions:
          time:
            source: "ayc/time"
          major_radius:
            imas: "thomson_scattering.channel[:].position.r"

  thomson_scattering_divertor:
    imas: thomson_scattering
    description: "Divertor Thomson scattering diagnostic" # MAST-U only; MAST has no divertor Thomson system
    interpolate:
      time:
        start: 0 # diagnostic doesn't pre-trigger
        step: 5e-3
        fill: 'none'
        dropna: false
      major_radius:
        start: 0.3
        end: 1.5
        step: 0.01
        fill: 'none'
        method: 'linear'

    profiles:
      t_e:
        source: "ayd/t_e"
        imas: "thomson_scattering.channel[:].t_e"
        units: "eV"
        description: "Electron temperature"
        dimension_order: ['major_radius', 'time']
        dimensions:
          time:
            source: "ayd/time"
            imas: "thomson_scattering.channel[:].t_e.time"
          major_radius:
            imas: "thomson_scattering.channel[:].position.r"

      n_e:
        source: "ayd/n_e"
        imas: "thomson_scattering.channel[:].n_e"
        units: "1/m ** 3"
        description: "Electron density"
        dimension_order: ['major_radius', 'time']
        dimensions:
          time:
            source: "ayd/time"
            imas: "thomson_scattering.channel[:].n_e.time"
          major_radius:
            imas: "thomson_scattering.channel[:].position.r"

      p_e:
        source: "ayd/p_e"
        units: "Pa"
        description: "Electron pressure"
        dimension_order: ['major_radius', 'time']
        dimensions:
          time:
            source: "ayd/time"
          major_radius:
            imas: "thomson_scattering.channel[:].position.r"

  charge_exchange:
    imas: charge_exchange
    description: "Charge exchange spectroscopy diagnostic."
    interpolate:
      time:
        start: -0.1
        step: 5e-3
        method: 'zero'
        dropna: true
      major_radius:
        start: 0
        end: 1.6
        step: 0.01
        method: "linear"
    profiles:
      t_i_core:
        source: "act/cel3/ss/t_i_core"
        units: "eV"
        description: "Core ion temperature" # MAST-U only; ACT on MAST publishes no core summary signal
        dimensions:
          time:
            source: "act/cel3/ss/time"
            imas: "charge_exchange.time"

      v_i_core:
        source: "act/cel3/ss/v_i_core"
        units: "m/s"
        description: "Core ion toroidal velocity" # MAST-U only
        dimensions:
          time:
            source: "act/cel3/ss/time"
            imas: "charge_exchange.time"

      t_i:
        source: "act/cel3/ss/pvb/c5291/temperature"
        imas: "charge_exchange.channel[:].ion[:].t_i"
        units: "eV"
        description: "Ion temperature at the channel measurement point"
        dimension_order: ['major_radius', 'time']
        dimensions:
          time:
            source: "act/cel3/ss/time"
            imas: "charge_exchange.time"
          major_radius:
            source: "/act/cel3/ss/major_radius"
            imas: "charge_exchange.channel[:].position.r"

      v_i:
        source: "act/cel3/ss/pvb/c5291/velocity"
        units: "m/s"
        description: "Ion toroidal velocity at the channel measurement point"
        dimension_order: ['major_radius', 'time']
        dimensions:
          time:
            source: "act/cel3/ss/time"
            imas: "charge_exchange.time"
          major_radius:
            source: "/act/cel3/ss/major_radius"
            imas: "charge_exchange.channel[:].position.r"

  soft_x_rays:
    imas: "soft_x_rays"
    description: "Soft X-rays tomography diagnostic"
