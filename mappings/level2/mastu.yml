facility: "MASTU"
default_loader: "uda"
plasma_current: "summary/ip"

global_interpolate:
  params:
    time:
      step: 0.00025
      method: 'zero'
      fill: 'ffill'
      dropna: true

datasets:

  equilibrium:
    imas: "equilibrium"

    interpolate:
      time:
        method: "none"
      major_radius:
        method: "none"
        dropna: true
      z:
        method: "none"
        dropna: true

    profiles:
      q:
        source: "epm/output/fluxFunctionProfiles/q"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].profiles_1d.q"
        dimension_order: ['profile_r', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          profile_r:
            units: 'dimensionless'

      psi_profile_1d:
        source: "epm/output/fluxFunctionProfiles/poloidalFlux"
        scale: -6.283185307
        units: 'Wb'
        imas: "equilibrium.time_slice[:].profiles_1d.psi"
        description: "Poloidal flux 1D profile.  CoCoS scale -2*pi applied."
        dimension_order: ['profile_r', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          profile_r:

      phi_profile_1d:
        source: "epm/output/fluxFunctionProfiles/toroidalFlux"
        scale: 6.283185307
        units: 'Wb'
        imas: "equilibrium.time_slice[:].profiles_1d.phi"
        description: "Toroidal flux 1D profile.  CoCoS scale +2*pi applied."
        dimension_order: ['profile_r', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          profile_r:

      f_profile:
        source: "epm/output/fluxFunctionProfiles/rBphi"
        units: 'T.m'
        imas: "equilibrium.time_slice[:].profiles_1d.f"
        description: "Diamagnetic function R*B_phi"
        dimension_order: ['profile_r', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          profile_r:

      ffprime:
        source: "epm/output/fluxFunctionProfiles/ffprime"
        scale: -0.159154943
        imas: "equilibrium.time_slice[:].profiles_1d.f_df_dpsi"
        description: "f * df/dpsi.  CoCoS scale -1/(2*pi) applied."
        dimension_order: ['profile_r', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          profile_r:

      total_pressure:
        source: "epm/output/radialProfiles/totalPressure"
        units: 'Pa'
        imas: "equilibrium.time_slice[:].profiles_1d.pressure"
        dimension_order: ['major_radius', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          major_radius:
            source: "epm/output/profiles2D/r"
            units: 'm'
            imas: "equilibrium.time_slice[:].coordinate_system.r"

      static_pressure:
        source: "epm/output/fluxFunctionProfiles/staticPressure"
        units: 'Pa'
        dimension_order: ['profile_r', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          profile_r:

      j_tor_1d:
        source: "epm/output/fluxFunctionProfiles/javrg"
        units: 'A.m^-2'
        imas: "equilibrium.time_slice[:].profiles_1d.j_tor"
        description: "Flux-surface averaged toroidal current density"
        dimension_order: ['profile_r', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          profile_r:

      r_inboard:
        source: "epm/output/fluxFunctionProfiles/rInboard"
        units: 'm'
        imas: "equilibrium.time_slice[:].profiles_1d.r_inboard"
        dimension_order: ['profile_r', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          profile_r:

      r_outboard:
        source: "epm/output/fluxFunctionProfiles/rOutboard"
        units: 'm'
        imas: "equilibrium.time_slice[:].profiles_1d.r_outboard"
        dimension_order: ['profile_r', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          profile_r:

      elongation_profile:
        source: "epm/output/fluxFunctionProfiles/elongation"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].profiles_1d.elongation"
        dimension_order: ['profile_r', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          profile_r:

      triangularity_lower_profile:
        source: "epm/output/fluxFunctionProfiles/lowerTriangularity"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].profiles_1d.triangularity_lower"
        dimension_order: ['profile_r', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          profile_r:

      triangularity_upper_profile:
        source: "epm/output/fluxFunctionProfiles/upperTriangularity"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].profiles_1d.triangularity_upper"
        dimension_order: ['profile_r', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          profile_r:

      volume_profile:
        source: "epm/output/fluxFunctionProfiles/plasmaFluxVolume"
        units: 'm^3'
        imas: "equilibrium.time_slice[:].profiles_1d.volume"
        dimension_order: ['profile_r', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          profile_r:

      area_profile:
        source: "epm/output/fluxFunctionProfiles/poloidalFluxArea"
        units: 'm^2'
        imas: "equilibrium.time_slice[:].profiles_1d.area"
        dimension_order: ['profile_r', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          profile_r:

      j_tor:
        source: "epm/output/profiles2D/jphi"
        imas: "equilibrium.time_slice[:].profiles_2d[:].j_tor"
        dimension_order: ['major_radius', 'z', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          major_radius:
            source: "epm/output/profiles2D/r"
            units: 'm'
            imas: "equilibrium.time_slice[:].coordinate_system.r"
          z:
            source: "epm/output/profiles2D/z"
            imas: "equilibrium.time_slice[:].coordinate_system.z"

      psi:
        source: "epm/output/profiles2D/poloidalFlux"
        scale: -6.283185307
        imas: "equilibrium.time_slice[:].profiles_2d[:].psi"
        description: "Poloidal flux on (R,Z) grid.  CoCoS scale -2*pi applied."
        dimension_order: ['major_radius', 'z', 'time']
        dimensions:
          time:
            source: "epm/time"
            units: 's'
            imas: "equilibrium.time_slice[:].time"
          major_radius:
            source: "epm/output/profiles2D/r"
            units: 'm'
            imas: "equilibrium.time_slice[:].coordinate_system.r"
          z:
            source: "epm/output/profiles2D/z"
            imas: "equilibrium.time_slice[:].coordinate_system.z"

      b_field_r:
        source: "epm/output/profiles2D/br"
        units: 'T'
        imas: "equilibrium.time_slice[:].profiles_2d[:].b_field_r"
        dimension_order: ['major_radius', 'z', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          major_radius:
            source: "epm/output/profiles2D/r"
          z:
            source: "epm/output/profiles2D/z"

      b_field_z:
        source: "epm/output/profiles2D/bz"
        units: 'T'
        imas: "equilibrium.time_slice[:].profiles_2d[:].b_field_z"
        dimension_order: ['major_radius', 'z', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          major_radius:
            source: "epm/output/profiles2D/r"
          z:
            source: "epm/output/profiles2D/z"

      b_field_tor:
        source: "epm/output/profiles2D/bphi"
        units: 'T'
        imas: "equilibrium.time_slice[:].profiles_2d[:].b_field_tor"
        dimension_order: ['major_radius', 'z', 'time']
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"
          major_radius:
            source: "epm/output/profiles2D/r"
          z:
            source: "epm/output/profiles2D/z"

      elongation:
        source: "epm/output/separatrixGeometry/elongation"
        imas: "equilibrium.time_slice[:].boundary.elongation"
        units: 'dimensionless'
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      elongation_axis:
        source: "epm/output/separatrixGeometry/elongation"
        units: 'dimensionless'
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      minor_radius:
        source: "epm/output/separatrixGeometry/minorRadius"
        units: 'm'
        imas: "equilibrium.time_slice[:].boundary.minor_radius"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      triangularity_lower:
        source: "epm/output/separatrixGeometry/lowerTriangularity"
        imas: "equilibrium.time_slice[:].boundary.triangularity_lower"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      triangularity_upper:
        source: "epm/output/separatrixGeometry/upperTriangularity"
        imas: "equilibrium.time_slice[:].boundary.triangularity_upper"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      x_point_r:
        imas: "equilibrium.time_slice[:].boundary.x_point[:].r"
        source:
          - name: "epm_xpoint_r"
            channels:
              - "epm/output/separatrixGeometry/dndXpoint1R"
              - "epm/output/separatrixGeometry/dndXpoint2R"
        units: "m"
        fill_value: -999
        dimensions:
          n_x_points:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      x_point_z:
        imas: "equilibrium.time_slice[:].boundary.x_point[:].z"
        source:
          - name: "epm_xpoint_z"
            channels:
              - "epm/output/separatrixGeometry/dndXpoint1Z"
              - "epm/output/separatrixGeometry/dndXpoint2Z"
        units: "m"
        fill_value: -999
        dimensions:
          n_x_points:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      strike_point_r:
        source:
          - name: "epm_strike_r"
            channels:
              - "epm/output/separatrixGeometry/dndXpoint1InnerStrikePointR"
              - "epm/output/separatrixGeometry/dndXpoint1OuterStrikePointR"
              - "epm/output/separatrixGeometry/dndXpoint2InnerStrikePointR"
              - "epm/output/separatrixGeometry/dndXpoint2OuterStrikePointR"
        imas: "equilibrium.time_slice[:].boundary.strike_point[:].r"
        units: "m"
        fill_value: -999
        dimensions:
          n_strike_points:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      strike_point_z:
        source:
          - name: "epm_strike_z"
            channels:
              - "epm/output/separatrixGeometry/dndXpoint1InnerStrikePointZ"
              - "epm/output/separatrixGeometry/dndXpoint1OuterStrikePointZ"
              - "epm/output/separatrixGeometry/dndXpoint2InnerStrikePointZ"
              - "epm/output/separatrixGeometry/dndXpoint2OuterStrikePointZ"
        imas: "equilibrium.time_slice[:].boundary.strike_point[:].z"
        units: "m"
        fill_value: -999
        dimensions:
          n_strike_points:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      lcfs_r:
        source: "epm/output/separatrixGeometry/rBoundary"
        imas: "equilibrium.time_slice[:].boundary.outline.r"
        units: 'm'
        dimension_order: ['n_boundary_coords', 'time']
        dimensions:
          time:
            source: "epm/time"
          n_boundary_coords:

      lcfs_z:
        source: "epm/output/separatrixGeometry/zBoundary"
        imas: "equilibrium.time_slice[:].boundary.outline.z"
        units: 'm'
        dimension_order: ['n_boundary_coords', 'time']
        dimensions:
          time:
            source: "epm/time"
          n_boundary_coords:

      geometric_axis_r:
        source: "epm/output/separatrixGeometry/rGeom"
        units: 'm'
        imas: "equilibrium.time_slice[:].boundary.geometric_axis.r"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      geometric_axis_z:
        source: "epm/output/separatrixGeometry/zGeom"
        units: 'm'
        imas: "equilibrium.time_slice[:].boundary.geometric_axis.z"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"


      magnetic_axis_r:
        source: "epm/output/globalParameters/magneticAxis/R"
        imas: "equilibrium.time_slice[:].global_quantities.magnetic_axis.r"
        units: 'm'
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      magnetic_axis_z:
        source: "epm/output/globalParameters/magneticAxis/Z"
        imas: "equilibrium.time_slice[:].global_quantities.magnetic_axis.z"
        units: 'm'
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      bphi_rmag:
        source: "epm/output/globalParameters/bphiRmag"
        units: 'T'
        imas: "equilibrium.time_slice[:].global_quantities.magnetic_axis.b_field_tor"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      bvac_rmag:
        source: "epm/output/globalParameters/bvacRmag"
        units: 'T.m'
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      current_centre_r:
        source: "epm/output/globalParameters/currentCentroid/R"
        units: 'm'
        imas: "equilibrium.time_slice[:].global_quantities.current_centre.r"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      current_centre_z:
        source: "epm/output/globalParameters/currentCentroid/Z"
        units: 'm'
        imas: "equilibrium.time_slice[:].global_quantities.current_centre.z"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      psi_axis:
        source: "epm/output/globalParameters/psiAxis"
        scale: -6.283185307
        units: 'Wb'
        imas: "equilibrium.time_slice[:].global_quantities.psi_axis"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      psi_boundary:
        source: "epm/output/globalParameters/psiBoundary"
        scale: -6.283185307
        units: 'Wb'
        imas: "equilibrium.time_slice[:].global_quantities.psi_boundary"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      beta_tor:
        source: "epm/output/globalParameters/betat"
        units: "dimensionless"
        imas: "equilibrium.time_slice[:].global_quantities.beta_tor"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      beta_tor_normal:
        source: "epm/output/globalParameters/betan"
        units: "dimensionless"
        imas: "equilibrium.time_slice[:].global_quantities.beta_tor_norm"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      beta_pol:
        source: "epm/output/globalParameters/betap"
        units: "dimensionless"
        imas: "equilibrium.time_slice[:].global_quantities.beta_pol"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      li:
        source: "epm/output/globalParameters/li3"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].global_quantities.li_3"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      q0:
        source: "epm/output/globalParameters/q0"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].global_quantities.q_axis"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      q95:
        source: "epm/output/globalParameters/q95"
        imas: "equilibrium.time_slice[:].global_quantities.q_95"
        units: 'dimensionless'
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      q_min:
        source: "epm/output/globalParameters/qMin"
        units: 'dimensionless'
        imas: "equilibrium.time_slice[:].global_quantities.q_min.value"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      ip:
        source: "epm/output/globalParameters/plasmaCurrent"
        units: 'A'
        imas: "equilibrium.time_slice[:].global_quantities.ip"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      energy_mhd:
        source: "epm/output/globalParameters/plasmaEnergy"
        units: 'J'
        imas: "equilibrium.time_slice[:].global_quantities.energy_mhd"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      volume:
        source: "epm/output/globalParameters/plasmaVolume"
        units: 'm^3'
        imas: "equilibrium.time_slice[:].global_quantities.volume"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      area:
        source: "epm/output/globalParameters/poloidalArea"
        units: 'm^2'
        imas: "equilibrium.time_slice[:].global_quantities.area"
        dimensions:
          time:
            source: "epm/time"
            imas: "equilibrium.time_slice[:].time"

      vloop_static:
        source: "/esm/vloop_static"
        units: 'V'
        dimensions:
          time:

      vloop_dynamic:
        source: "/esm/vloop_dynamic"
        units: 'V'
        dimensions:
          time:

  pulse_schedule:
    imas: "pulse_schedule"
    profiles:
      i_plasma:
        source: "xdc/plasma/t/ip_ref"
        imas: "pulse_schedule.flux_control.i_plasma"
        target_units: "A"
        dimensions:
          time:

      n_e_line:
        source: "xdc/fuelling/t/density_ref_target"
        imas: "pulse_schedule.density_control.n_e_line"
        units: "m^-2"
        scale: 1e21
        dimensions:
          time:

      vloop_reference:
        source: "xdc/plasma/t/vloop_ref"
        units: 'V'
        imas: "pulse_schedule.flux_control.loop_voltage.reference"
        dimensions:
          time:

      ohmic_blender_mode:
        source: "xdc/plasma/t/ohmic_blender"
        imas: "pulse_schedule.flux_control.mode"
        dimensions:
          time:

      x_point_r_reference:
        source: "xdc/shape/t/rx_ref"
        units: 'm'
        imas: "pulse_schedule.position_control.x_point[:].r.reference"
        dimensions:
          time:

      x_point_z_reference:
        source: "xdc/shape/t/zx_ref"
        units: 'm'
        imas: "pulse_schedule.position_control.x_point[:].z.reference"
        dimensions:
          time:

  summary:
    imas: "summary"
    profiles:
      ip:
        source: "amc/plasma_current"
        imas: "summary.global_quantities.ip"
        target_units: "A"
        dimensions:
          time:

      line_average_n_e:
        imas: "summary.line_average.n_e.value"
        source: "/esm/nebar"
        dimensions:
          time:

      power_nbi:
        source: "/anb/sum/power"
        target_units: "W"
        imas: "summary.heating_current_drive.power_nbi"
        dimensions:
          time:

      power_ohm:
        source: "/esm/pohm"
        units: 'W'
        imas: "summary.global_quantities.power_ohm.value"
        dimensions:
          time:

      neutron_rates_total:
        source: "/anu/fc/detector1/neutrons_var"
        imas: "summary.fusion.neutron_rates.total"
        units: "cps"
        target_units: "Hz"
        dimensions:
          time:

      power_radiated:
        imas: "summary.global_quantities.power_radiated.value"
        source: "/abm/prad"
        target_units: "W"
        dimensions:
          time:
            imas: "summary.time"

      greenwald_density:
        source: "/esm/nG"
        dimensions:
          time:
            imas: "summary.time"

      greenwald_fraction:
        source: "/esm/fG"
        imas: "summary.global_quantities.greenwald_fraction.value"
        dimensions:
          time:
            imas: "summary.time"

  pf_active:
    imas: "pf_active"
    profiles:
      solenoid_current:
        source: "/amc/rogext/p1"
        dimensions:
          time:
            imas: "summary.time"

      coil_current:
        imas: "pf_active.coil[:].current.data"
        scale: 1000.0
        target_units: "A"
        source:
          - name: "amc_rogext"
            channels:
              # D-family divertor coils (14)
              - "/amc/rogext/d1u"
              - "/amc/rogext/d1l"
              - "/amc/rogext/d2u"
              - "/amc/rogext/d2l"
              - "/amc/rogext/d3u"
              - "/amc/rogext/d3l"
              - "/amc/rogext/dpu"
              - "/amc/rogext/dpl"
              - "/amc/rogext/d5u"
              - "/amc/rogext/d5l"
              - "/amc/rogext/d6u"
              - "/amc/rogext/d6l"
              - "/amc/rogext/d7u"
              - "/amc/rogext/d7l"
              # P-family equilibrium coils (9)
              - "/amc/rogext/p1"
              - "/amc/rogext/pxu"
              - "/amc/rogext/pxl"
              - "/amc/rogext/p4u"
              - "/amc/rogext/p4l"
              - "/amc/rogext/p5u"
              - "/amc/rogext/p5l"
              - "/amc/rogext/p6u"
              - "/amc/rogext/p6l"
        dimensions:
          channel:
          time:
            imas: "pf_active.coil[:].current.time"

      efcc_current:
        imas: "pf_active.coil[:].current.data"
        scale: 1000.0
        target_units: "A"
        description: "Error field correction coil currents."
        source:
