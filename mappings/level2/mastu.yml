  pf_active:
    imas: "pf_active"
    description: "Description of the axisymmetric active poloidal field (PF)
      coils and supplies; includes the limits of these systems; includes the
      forces on them; does not include non-axisymmetric coil systems"
    interpolate:
      time:
        start: -0.1
        step: 5e-5
        method: 'zero'
        dropna: true
    profiles:
      coil_current:
        imas: "pf_active.coil[:].current.data"
        target_units: "A"
        description: "Measured PF coil current"
        source:
          - name: "AMC"
            channels:
              - "/AMC/ROGEXT/P1"
              - "/AMC/ROGEXT/P4L"
              - "/AMC/ROGEXT/P4U"
              - "/AMC/ROGEXT/P5L"
              - "/AMC/ROGEXT/P5U"
              - "/AMC/ROGEXT/P6L"
              - "/AMC/ROGEXT/P6U"
              - "/AMC/ROGEXT/PXL"
              - "/AMC/ROGEXT/PXU"
        dimensions:
          current_channel:
          time:
            imas: "pf_active.coil[:].current.time"

      coil_voltage:
        imas: "pf_active.coil[:].voltage.data"
        units: "V"
        description: "PF coil drive voltage demanded by the plasma control system"
        source:
          - name: "XDC/PF"
            channels:
              - '/xdc/pf/f/p1'
              - '/xdc/pf/f/p4'
              - '/xdc/pf/f/p5'
              - '/xdc/pf/f/pc'
              - '/xdc/pf/f/px'
        dimensions:
          voltage_channel:
          time:
            imas: "pf_active.coil[:].voltage.time"

  tf:
    imas: "tf"
    description: "Toroidal field coils"
    interpolate:
      time:
        start: -0.1
        step: 2e-4
        method: 'zero'
        dropna: true
    profiles:
      coil_current:
        source: "amc/rogext/tf"
        imas: "tf.coil[:].current.data"
        target_units: "A"
        description: "TF feed current"
        dimensions:
          time:
            imas: "tf.coil[:].current.time"

  magnetics:
    imas: "magnetics"
    description: "Magnetic diagnostics for equilibrium identification and plasma shape control."

    interpolate:
      time:
        start: -0.1
        step: 2e-4
        method: 'zero'
        dropna: true

      time_omaha:
        start: -0.1
        step: 1e-6
        method: 'zero'
        dropna: true

